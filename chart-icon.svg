<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#26FF77" opacity="0.1" rx="20"/>
  
  <!-- Chart bars -->
  <g transform="translate(40, 60)">
    <!-- Bar 1 -->
    <rect x="10" y="50" width="18" height="50" fill="#26FF77" rx="3"/>
    
    <!-- Bar 2 -->
    <rect x="40" y="30" width="18" height="70" fill="#4dff99" rx="3"/>
    
    <!-- Bar 3 -->
    <rect x="70" y="15" width="18" height="85" fill="#26FF77" rx="3"/>
    
    <!-- Bar 4 -->
    <rect x="100" y="40" width="18" height="60" fill="#4dff99" rx="3"/>
  </g>
  
  <!-- Grid lines -->
  <line x1="20" y1="160" x2="180" y2="160" stroke="#26FF77" stroke-width="2" opacity="0.3"/>
</svg>