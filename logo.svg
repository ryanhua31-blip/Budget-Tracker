<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#26FF77" opacity="0.1" stroke="#26FF77" stroke-width="2"/>
  
  <!-- Wallet shape -->
  <g transform="translate(50, 60)">
    <!-- Main wallet body -->
    <rect x="0" y="15" width="100" height="70" rx="8" fill="#26FF77" stroke="#26FF77" stroke-width="2"/>
    
    <!-- Wallet flap -->
    <path d="M 0 15 Q 50 0 100 15" fill="none" stroke="#26FF77" stroke-width="2"/>
    <ellipse cx="50" cy="12" rx="50" ry="8" fill="#4dff99"/>
    
    <!-- Card slot -->
    <rect x="10" y="25" width="80" height="12" rx="2" fill="#0f0f0f" opacity="0.3"/>
    
    <!-- Money stack lines -->
    <line x1="15" y1="45" x2="85" y2="45" stroke="#0f0f0f" stroke-width="2" opacity="0.2"/>
    <line x1="15" y1="55" x2="85" y2="55" stroke="#0f0f0f" stroke-width="2" opacity="0.2"/>
    <line x1="15" y1="65" x2="75" y2="65" stroke="#0f0f0f" stroke-width="2" opacity="0.2"/>
  </g>
  
  <!-- Dollar sign accent -->
  <g transform="translate(135, 120)">
    <circle cx="0" cy="0" r="18" fill="#26FF77" opacity="0.2"/>
    <text x="0" y="6" font-size="24" font-weight="bold" fill="#26FF77" text-anchor="middle">$</text>
  </g>
</svg>